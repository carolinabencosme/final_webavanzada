x-java-build: &java-build
  context: ./services
  dockerfile: Dockerfile

x-java-tracing: &java-tracing
  ZIPKIN_URL: http://zipkin:9411/api/v2/spans

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: bookstore-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - bookstore-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6
    container_name: bookstore-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - bookstore-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: bookstore-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - bookstore-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: bookstore-zipkin
    ports:
      - "9411:9411"
    networks:
      - bookstore-network

  # Mailpit: mismo uso que MailHog (SMTP 1025, UI 8025) pero UI moderna sin el bug Angular /api/v2/jim 404
  mailpit:
    image: axllent/mailpit:latest
    container_name: bookstore-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - bookstore-network

  # ── Core Services ────────────────────────────────────────────────────────────
  discovery-service:
    build:
      <<: *java-build
      args:
        MODULE: discovery-service
    container_name: bookstore-discovery
    ports:
      - "8761:8761"
    environment:
      <<: *java-tracing
    networks:
      - bookstore-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  config-service:
    build:
      <<: *java-build
      args:
        MODULE: config-service
    container_name: bookstore-config
    ports:
      - "8888:8888"
    environment:
      <<: *java-tracing
      EUREKA_HOST: discovery-service
    depends_on:
      discovery-service:
        condition: service_healthy
    networks:
      - bookstore-network

  api-gateway:
    build:
      <<: *java-build
      args:
        MODULE: api-gateway
    container_name: bookstore-gateway
    ports:
      - "8080:8080"
    environment:
      <<: *java-tracing
      EUREKA_HOST: discovery-service
      JWT_SECRET: bookstoreSecretKey2024bookstoreSecretKey2024XD
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 45s
    networks:
      - bookstore-network

  # ── Auth Service (2 instances) ───────────────────────────────────────────────
  auth-service-1:
    build:
      <<: *java-build
      args:
        MODULE: auth-service
    container_name: bookstore-auth-1
    ports:
      - "8081:8081"
    environment:
      <<: *java-tracing
      SERVER_PORT: 8081
      DB_HOST: postgres
      DB_NAME: authdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      EUREKA_HOST: discovery-service
      JWT_SECRET: bookstoreSecretKey2024bookstoreSecretKey2024XD
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - bookstore-network

  auth-service-2:
    build:
      <<: *java-build
      args:
        MODULE: auth-service
    container_name: bookstore-auth-2
    ports:
      - "8181:8081"
    environment:
      <<: *java-tracing
      SERVER_PORT: 8081
      DB_HOST: postgres
      DB_NAME: authdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      EUREKA_HOST: discovery-service
      JWT_SECRET: bookstoreSecretKey2024bookstoreSecretKey2024XD
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - bookstore-network

  # ── Catalog Service (2 instances) ────────────────────────────────────────────
  catalog-service-1:
    build:
      <<: *java-build
      args:
        MODULE: catalog-service
    container_name: bookstore-catalog-1
    ports:
      - "8082:8082"
    environment:
      <<: *java-tracing
      MONGO_HOST: mongodb
      MONGO_DB: catalogdb
      EUREKA_HOST: discovery-service
    depends_on:
      mongodb:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - bookstore-network

  catalog-service-2:
    build:
      <<: *java-build
      args:
        MODULE: catalog-service
    container_name: bookstore-catalog-2
    ports:
      - "8182:8082"
    environment:
      <<: *java-tracing
      MONGO_HOST: mongodb
      MONGO_DB: catalogdb
      EUREKA_HOST: discovery-service
    depends_on:
      mongodb:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - bookstore-network

  # ── Cart/Order Service (2 instances) ─────────────────────────────────────────
  cart-order-service-1:
    build:
      <<: *java-build
      args:
        MODULE: cart-order-service
    container_name: bookstore-cart-1
    ports:
      - "8083:8083"
    environment:
      <<: *java-tracing
      DB_HOST: postgres
      DB_NAME: orderdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      EUREKA_HOST: discovery-service
      PAYMENT_MOCK: "true"
      PAYPAL_ENABLED: ${PAYPAL_ENABLED:-false}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET:-}
      PAYPAL_BASE_URL: ${PAYPAL_BASE_URL:-https://api-m.sandbox.paypal.com}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - bookstore-network

  cart-order-service-2:
    build:
      <<: *java-build
      args:
        MODULE: cart-order-service
    container_name: bookstore-cart-2
    ports:
      - "8183:8083"
    environment:
      <<: *java-tracing
      DB_HOST: postgres
      DB_NAME: orderdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      EUREKA_HOST: discovery-service
      PAYMENT_MOCK: "true"
      PAYPAL_ENABLED: ${PAYPAL_ENABLED:-false}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET:-}
      PAYPAL_BASE_URL: ${PAYPAL_BASE_URL:-https://api-m.sandbox.paypal.com}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - bookstore-network

  # ── Review Service (2 instances) ─────────────────────────────────────────────
  review-service-1:
    build:
      <<: *java-build
      args:
        MODULE: review-service
    container_name: bookstore-review-1
    ports:
      - "8084:8084"
    environment:
      <<: *java-tracing
      DB_HOST: postgres
      DB_NAME: reviewdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      EUREKA_HOST: discovery-service
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - bookstore-network

  review-service-2:
    build:
      <<: *java-build
      args:
        MODULE: review-service
    container_name: bookstore-review-2
    ports:
      - "8184:8084"
    environment:
      <<: *java-tracing
      DB_HOST: postgres
      DB_NAME: reviewdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      EUREKA_HOST: discovery-service
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    networks:
      - bookstore-network

  # ── Notification Service ──────────────────────────────────────────────────────
  notification-report-service:
    build:
      <<: *java-build
      args:
        MODULE: notification-report-service
    container_name: bookstore-notification
    ports:
      - "8085:8085"
    environment:
      <<: *java-tracing
      MONGO_HOST: mongodb
      MONGO_DB: notificationdb
      RABBITMQ_HOST: rabbitmq
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_SMTP_AUTH: "false"
      MAIL_STARTTLS_ENABLE: "false"
      EUREKA_HOST: discovery-service
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailpit:
        condition: service_started
      discovery-service:
        condition: service_healthy
    networks:
      - bookstore-network

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: bookstore-frontend
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - bookstore-network

networks:
  bookstore-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  rabbitmq_data:
