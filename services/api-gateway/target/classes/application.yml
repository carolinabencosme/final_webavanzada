server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            # Tokens/seg por IP (ajustable con RATE_LIMIT_REPLENISH / RATE_LIMIT_BURST vía env en el contenedor)
            redis-rate-limiter.replenishRate: 30
            redis-rate-limiter.burstCapacity: 60
            key-resolver: "#{@ipKeyResolver}"
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**,/api/users/**,/api/roles/**
          filters:
            - StripPrefix=1
        - id: catalog-service
          uri: lb://catalog-service
          predicates:
            - Path=/api/properties,/api/properties/**
          filters:
            - StripPrefix=1
        - id: reservation-service
          uri: lb://reservation-service
          predicates:
            - Path=/api/cart/**,/api/reservations/**,/api/checkout/**,/api/payments/**
          filters:
            - StripPrefix=1
        - id: review-service
          uri: lb://review-service
          predicates:
            - Path=/api/reviews/**
          filters:
            - StripPrefix=1
        - id: notification-service
          uri: lb://notification-report-service
          predicates:
            - Path=/api/reports/**,/api/notifications/**
          filters:
            - StripPrefix=1

jwt:
  secret: ${JWT_SECRET:bookstoreSecretKey2024bookstoreSecretKey2024XD}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
  endpoints:
    web:
      exposure:
        include: health,info
